services:

  # Nginx Streaming Server
  # Imagen compilada desde fuente con el módulo nginx-rtmp-module.
  # Recibe streams RTMP (OBS/ffmpeg) en :1935, los convierte a HLS/DASH
  # y sirve el player web + endpoints de monitoreo en :80.
  nginx-stream-rtpm:
    build:
     # context: monitoring            # contexto = raíz del repo
      dockerfile: ./nginx/Dockerfile  # Dockerfile dentro de nginx/
    image: nginx-rtmp-server
    container_name: nginx_streaming_server
    ports:
      - "1935:1935"   # RTMP  → OBS Studio / ffmpeg (ingestión de stream)
      - "80:80"       # HTTP  → player web, HLS/DASH, /nginx_status, /stat
      - "443:443"     # HTTPS → requiere certificados en ./certs/
    volumes:
      - ./nginx/nginx.conf:/usr/local/nginx/conf/nginx.conf  # config recargable sin rebuild
      - ./certs:/usr/local/nginx/certs                       # certificados SSL del host
    restart: unless-stopped
    networks:
      - streaming_network   # red para tráfico RTMP/HLS público
      - monitoring_network  # red privada para que nginx-exporter y rtmp-exporter accedan a /nginx_status y /stat

  # Nginx Prometheus Exporter
  # Exporter oficial de nginx. Lee /nginx_status (stub_status) y expone las
  # métricas en formato Prometheus en :9113/metrics.
  # Métricas: conexiones activas, requests totales, estado de workers.
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx_prometheus_exporter
    ports:
      - "9113:9113"
    environment:
      NGINX_STUB_STATUS_URL: http://nginx-stream-rtpm:80/nginx_status
    depends_on:
      - nginx-stream-rtpm
    restart: unless-stopped
    networks:
      - monitoring_network
      - streaming_network

  # RTMP Exporter
  # Exporter custom (Python/Flask). Parsea el XML de /stat (nginx-rtmp-module)
  # y expone en :9114/metrics: clientes conectados, bitrate in/out, bytes
  # totales y uptime por stream activo.
  rtmp-exporter:
    build:
      context: ./monitoring/rtmp-exporter
      dockerfile: Dockerfile
    image: rtmp-exporter
    container_name: rtmp_exporter
    ports:
      - "9114:9114"
    environment:
      NGINX_STAT_URL: http://nginx-stream-rtpm:80/stat  # URL del XML de estado RTMP
      EXPORTER_PORT: "9114"
      SCRAPE_TIMEOUT: "2"  # segundos de timeout en el GET a /stat
    depends_on:
      - nginx-stream-rtpm
    restart: unless-stopped
    networks:
      - monitoring_network
      - streaming_network

  # Prometheus
  # Base de datos de series temporales. Scrapea nginx-exporter, rtmp-exporter
  # y node-exporter según la configuración de monitoring/prometheus.yml.
  # --web.enable-lifecycle: permite recargar la config con POST /-/reload
  # sin reiniciar el contenedor.
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_server
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml  # configuración de scrape
      - prometheus_data:/prometheus                                 # datos persistentes
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    depends_on:
      - nginx-exporter
      - node-exporter
    restart: unless-stopped
    networks:
      - monitoring_network

  # Grafana
  # Dashboard de visualización. Se conecta a Prometheus como datasource y
  # permite crear paneles con métricas de streaming en tiempo real.
  # Accesible en http://localhost:3000 (usuario/contraseña: admin/admin).
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_server
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana  # dashboards y configuración persistentes
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin   # cambiar en producción
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring_network

  # Node Exporter
  # Exporter del sistema operativo del host. Monta el filesystem raíz en modo
  # read-only para leer métricas del kernel: CPU, RAM, disco, red, etc.
  # --path.rootfs=/host: indica dónde está el FS raíz del host dentro del
  # contenedor (montado como volumen abajo).
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter_server
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'  # FS del host montado en solo lectura; rslave evita
                             # que los mounts del contenedor se propaguen al host
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - monitoring_network

# Redes
# streaming_network : conecta nginx con los exporters que leen /stat y /nginx_status
# monitoring_network: conecta todos los componentes de monitorización
networks:
  streaming_network:
    driver: bridge
  monitoring_network:
    driver: bridge

# Volúmenes persistentes
# Gestionados por Docker para que los datos sobrevivan a la destrucción del contenedor.
# prometheus_data : series temporales de Prometheus
# grafana_data    : dashboards, datasources y usuarios de Grafana
volumes:
  prometheus_data:
  grafana_data:
