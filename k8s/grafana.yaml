# PersistentVolumeClaim: grafana-pvc
# Solicita 2 GiB para almacenar dashboards, datasources y configuración de
# Grafana. Sin PVC, toda la configuración se pierde al reiniciar el pod.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: streaming
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
# Deployment: grafana
# Dashboard de visualización. Se conecta a Prometheus como datasource y permite
# crear paneles con métricas de streaming en tiempo real.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: streaming
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      # Grafana requiere correr con el GID 472 y el UID 472 para poder
      # escribir en /var/lib/grafana. Sin esto el PVC no es accesible.
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent
          env:
            # Las credenciales se leen del Secret 'grafana-credentials' (01-secrets.yaml)
            # en lugar de hardcodearlas aquí, siguiendo el principio de mínimo privilegio.
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: admin-password
          ports:
            - name: web
              containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana  # dashboards, plugins y base de datos SQLite
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-pvc
---
# Service: grafana
# NodePort expone Grafana directamente en la IP del nodo sin necesitar minikube
# tunnel. Acceso: minikube service grafana -n streaming
# nodePort 30300: puerto fijo en el nodo para facilitar el acceso en desarrollo.
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: streaming
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: web
      port: 3000
      targetPort: 3000
      nodePort: 30300  # accesible en http://<node-ip>:30300
