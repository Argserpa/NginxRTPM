# Secret: credenciales de Grafana
# Se usa un secret (type: Opaque) en lugar de variables de entorno planas en el
# Deployment para que las contraseñas no queden expuestas en los YAMLs de la
# aplicación. El Deployment de Grafana las referencia con secretKeyRef.
#
# Los valores están codificados en base64:
#   echo -n 'admin'      | base64  →  YWRtaW4=
#   echo -n 'prom_admin' | base64  →  cHJvbV9hZG1pbg==
#
# NO USAR EN PRODUCCIÓN. Cuando se vaya a desplegar en la nube
# usar *Sealed Secrets, External Secrets Operator o HashiCorp Vault*
# para no almacenar valores sensibles en el repositorio git.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: streaming
type: Opaque
data:
  admin-user: YWRtaW4=
  admin-password: cHJvbV9hZG1pbg==
