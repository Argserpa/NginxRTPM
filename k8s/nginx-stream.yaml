# Deployment: nginx-stream
# Servidor principal de streaming. Corre el binario nginx compilado con
# nginx-rtmp-module. Gestiona tres protocolos:
#   - RTMP  (1935): ingestión de streams desde OBS, ffmpeg, etc.
#   - HTTP  (80)  : player web, endpoints HLS/DASH, /nginx_status y /stat
#   - HTTPS (443) : igual que HTTP pero con TLS
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-stream
  namespace: streaming
  labels:
    app: nginx-stream
spec:
  # RTMP no escala horizontalmente sin almacenamiento compartido (los segmentos
  # HLS/DASH son efímeros en /tmp de cada pod). Mantener una sola réplica.
  replicas: 1
  selector:
    matchLabels:
      app: nginx-stream
  template:
    metadata:
      labels:
        app: nginx-stream
    spec:
      containers:
        - name: nginx-stream
          image: nginx-rtmp-server:latest
          imagePullPolicy: Never  # imagen local cargada en minikube con 'minikube image load'
          ports:
            - name: rtmp
              containerPort: 1935
              protocol: TCP
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP

          # Opciones de montaje en runtime (descomentar según se necesite).
          #
          # 1) nginx.conf desde ConfigMap → permite cambiar config sin recompilar
          #    la imagen. Crear primero un ConfigMap con el contenido de
          #    nginx/nginx.conf:  kubectl create configmap nginx-config \
          #        --from-file=nginx.conf=../nginx/nginx.conf -n streaming
          #
          # 2) Certificados TLS desde Secret → necesario para HTTPS:443.
          #    El Secret se llama `nginx-tls` y se crea siguiendo las
          #    instrucciones en k8s/02-tls-secret.yaml.
          #    Recordar también descomentar el bloque `server { listen 443 ssl; }`
          #    en nginx/nginx.conf.
          # volumeMounts:
          #   - name: nginx-config
          #     mountPath: /usr/local/nginx/conf/nginx.conf
          #     subPath: nginx.conf
          #   - name: tls-certs
          #     mountPath: /usr/local/nginx/certs
          #     readOnly: true

          # Recursos
          # requests: lo que K8s garantiza al pod en el nodo
          # limits  : máximo consumible; si lo supera, el pod es evicted (memoria)
          #           o throttled (CPU)
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

      # volumes:
      #   - name: nginx-config
      #     configMap:
      #       name: nginx-config
      #   - name: tls-certs
      #     secret:
      #       secretName: nginx-tls
      #       # Crear con:
      #       #   kubectl create secret tls nginx-tls \
      #       #       --cert=../certs/nginx.crt --key=../certs/nginx.key -n streaming
      #       # (Ver k8s/02-tls-secret.yaml para más detalles.)
---
# Service: nginx-stream
# Expone el Deployment externamente. LoadBalancer asigna una IP externa del
# clúster; en minikube requiere ejecutar 'minikube tunnel' en otra terminal.
# Los exporters (nginx-exporter, rtmp-exporter) se conectan a este Service
# por su nombre DNS interno: http://nginx-stream:80/nginx_status y /stat.
apiVersion: v1
kind: Service
metadata:
  name: nginx-stream
  namespace: streaming
  labels:
    app: nginx-stream
spec:
  type: LoadBalancer
  selector:
    app: nginx-stream
  ports:
    - name: rtmp
      port: 1935
      targetPort: 1935
      protocol: TCP
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
