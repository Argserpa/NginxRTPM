<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NginxRTMP · Live</title>
    <link rel="icon" href="/images/favicon.png" type="image/x-icon"/>
    <!-- Estilos compartidos (variables CSS, header, spinner, empty-state) -->
    <link rel="stylesheet" href="css/common.css" />
    <!-- Estilos específicos de la página Live (player, controles, badges) -->
    <link rel="stylesheet" href="css/live.css" />
    <!-- Video.js: biblioteca de reproducción HLS/DASH en el navegador -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
</head>
<body>

<!-- HEADER: barra superior con título animado y navegación -->
<header class="header">
    <h1>
        <!-- Punto verde parpadeante que indica que el servidor está activo -->
        <span class="live-dot"></span>
        NginxRTMP
    </h1>
    <nav class="header-nav">
        <a href="/" class="active">Live</a>
    </nav>
</header>

<!-- CONTENIDO PRINCIPAL -->
<main class="content">

    <!-- Player de video
         Video.js inicializa este elemento y lo reemplaza con su propio DOM.
         'data-setup={}' activa la inicialización automática.
         Se proveen dos fuentes: HLS (.m3u8) y DASH (.mpd) para máxima
         compatibilidad de reproductores. Video.js selecciona la primera
         que el navegador soporte. -->
    <video
            id="stream-player"
            class="video-js vjs-default-skin"
            controls
            preload="auto"
            playsinline
            data-setup='{}'
    >
        <!-- HLS: soportado nativamente en Safari; Video.js lo maneja en Chrome/Firefox -->
        <source src="/live/mi_stream.m3u8" type="application/x-mpegURL" />
        <!-- DASH: alternativa al HLS con el mismo manifest de segmentos -->
        <source src="/live/mi_stream.mpd" type="application/dash+xml" />
        <p class="vjs-no-js">
            Habilita JavaScript para ver el stream.
        </p>
    </video>

    <!-- Controles adicionales
         Botones fuera de la barra de Video.js para acciones menos frecuentes. -->
    <div class="controls">
        <button id="btn-reload">↺ Recargar stream</button>
        <!-- Badge que muestra el protocolo activo y el estado de latencia -->
        <span class="latency-badge" id="latency-label">HLS · esperando…</span>
        <button id="btn-fullscreen">⛶ Pantalla completa</button>
    </div>

    <!-- Info strip: stream key activo y estado en directo/offline -->
    <div class="stream-info">
        <!-- stream key: debe coincidir con la clave usada en OBS/ffmpeg -->
        <span class="stream-key">stream key: <span>mi_stream</span></span>
        <!-- Estado actualizado por JavaScript según los eventos del player -->
        <span class="status-dot" id="status-dot">Offline</span>
    </div>

    <!-- Endpoints disponibles: links directos a cada protocolo de reproducción -->
    <p class="section-label">Endpoints disponibles</p>
    <div class="proto-list">
        <a class="proto-tag" href="/live/mi_stream.m3u8" target="_blank">HLS · .m3u8</a>
        <a class="proto-tag" href="/live/mi_stream.mpd"  target="_blank">DASH · .mpd</a>
        <a class="proto-tag" href="rtmp://localhost:1935/live/mi_stream" target="_blank">RTMP · 1935</a>
    </div>

</main>

<!-- Video.js core -->
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<!-- VHS (Video.js HTTP Streaming): maneja la descarga y buffering de HLS/DASH -->
<script src="https://unpkg.com/@videojs/http-streaming@3.9.0/dist/videojs-http-streaming.min.js"></script>

<script>
    // Inicialización del player
    // liveui: true activa los controles optimizados para streams en vivo
    //   (botón "ir al directo" en lugar de barra de progreso fija).
    // enableLowInitialPlaylist: reduce la latencia inicial eligiendo
    //   el segmento de menor calidad al comenzar.
    // smoothQualityChange: evita rebuffering al cambiar de calidad.
    var player = videojs('stream-player', {
        liveui: true,
        html5: {
            vhs: {
                enableLowInitialPlaylist: true,
                smoothQualityChange: true
            }
        }
    });

    var statusDot    = document.getElementById('status-dot');
    var latencyLabel = document.getElementById('latency-label');

    // Eventos del player: actualizan el estado visual
    player.on('playing', function () {
        statusDot.textContent = 'En directo';
        statusDot.classList.add('live');       // aplica color verde + animación
        latencyLabel.textContent = 'HLS · en vivo';
    });

    player.on('pause',  function () {
        statusDot.textContent = 'Pausado';
        statusDot.classList.remove('live');
    });

    player.on('error',  function () {
        // El stream puede no estar activo todavía; mostrar Offline sin alarmar.
        statusDot.textContent = 'Offline';
        statusDot.classList.remove('live');
        latencyLabel.textContent = 'HLS · sin señal';
    });

    // Botón recargar
    // Fuerza al player a volver a pedir la playlist .m3u8 desde el principio,
    // útil cuando el stream se reconecta tras una caída.
    document.getElementById('btn-reload').addEventListener('click', function () {
        var src = player.currentSrc();
        player.src({ src: src, type: 'application/x-mpegURL' });
        player.play();
    });

    // Botón pantalla completa
    document.getElementById('btn-fullscreen').addEventListener('click', function () {
        player.requestFullscreen();
    });
</script>

</body>
</html>
