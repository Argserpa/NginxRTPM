# Bloque global
# Directivas que afectan al proceso principal de nginx.
user  nginx;
worker_processes  auto;  # "auto" usa tantos workers como núcleos de CPU disponibles

# Redirigir logs a stderr/stdout para que Docker/K8s los recoja con 'docker logs'
# y no se acumulen en archivos dentro del contenedor.
error_log  /dev/stderr warn;
pid        /run/nginx.pid;


# Bloque events
# Configura el modelo de E/S de conexiones del proceso worker.
events {
    worker_connections  1024;  # Máximo de conexiones simultáneas por worker process
}


# Bloque rtmp
# Proporcionado por nginx-rtmp-module. Gestiona la ingestión de streams RTMP
# (protocolo usado por OBS, ffmpeg, etc.) y su conversión a HLS/DASH.
rtmp {
    server {
        listen 1935;       # Puerto estándar de RTMP
        chunk_size 4096;   # Tamaño del chunk RTMP; valores más altos reducen overhead

        # Aplicación: live
        # Punto de publicación: rtmp://<host>:1935/live/<stream_key>
        # Un publicador (OBS) envía el stream aquí; los viewers lo consumen
        # vía HLS o DASH a través del bloque http {}.
        application live {
            live on;    # Permite que múltiples clientes se suscriban al stream
            record off; # No guardar en disco; activar y configurar record_path para VOD

            # HLS (HTTP Live Streaming)
            # nginx-rtmp-module segmenta el stream en archivos .ts y genera
            # una playlist .m3u8 que los reproductores descargan por HTTP.
            hls on;
            hls_path /tmp/hls/live;      # Directorio de segmentos y playlist
            hls_fragment 3s;             # Duración de cada segmento (.ts)
            hls_playlist_length 12s;     # Ventana de tiempo mantenida en la playlist
            hls_sync 100ms;              # Tolerancia de sincronización A/V entre segmentos
            hls_continuous on;           # Evita reiniciar la numeración de segmentos
                                         # al reconectar el publicador (evita saltos de video)
            hls_cleanup on;              # Elimina segmentos viejos automáticamente

            # DASH (Dynamic Adaptive Streaming over HTTP)
            # Similar a HLS pero con formato de manifest .mpd (estándar MPEG).
            # Complementa HLS para mayor compatibilidad de reproductores.
            dash on;
            dash_path /tmp/dash/live;    # Directorio de segmentos y manifest
            dash_fragment 3s;
            dash_playlist_length 12s;
        }

        # Aplicación: vod (desactivada)
        # nginx-rtmp puede reproducir archivos pregrabados como si fueran live.
        # No es un servidor VOD robusto; para producción usar HLS estático.
        # application vod {
             play /tmp/vod/files;
        # }
    }
}


# Bloque http
# Servidor HTTP estándar de nginx. Sirve el frontend, los segmentos HLS/DASH
# y los endpoints de monitoreo (/nginx_status, /stat).
http {
    include       mime.types;            # Mapeo de extensiones a Content-Type
    default_type  application/octet-stream;

    sendfile        on;   # Optimización del kernel para servir archivos estáticos
    #tcp_nopush     on;   # Activar si se habilita sendfile + keep-alive

    keepalive_timeout  65;  # Tiempo máximo de inactividad antes de cerrar la conexión

    #gzip  on;   # Activar para comprimir respuestas de texto (JS, CSS, manifests)

    access_log /dev/stdout;  # Logs de acceso redirigidos a stdout (ver 'docker logs')

    server {
        listen 80;
        server_name  localhost;

        # Frontend (player web)
        # Sirve los archivos estáticos de nginx/html/ (index.html + CSS).
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
        }

        # Endpoint HLS
        # Los reproductores solicitan la playlist: GET /live/<key>.m3u8
        # y luego los segmentos: GET /live/<key>-<seq>.ts
        # root apunta al directorio padre de /tmp/hls/live porque nginx
        # concatena root + uri: /tmp/hls + /live → /tmp/hls/live
        location /live {
            types {
                application/vnd.apple.mpegurl m3u8;  # Content-Type correcto para playlists HLS
                video/mp2t ts;                        # Content-Type para segmentos de video
            }
            root /tmp/hls;
            add_header 'Access-Control-Allow-Origin' '*';  # CORS: permite reproductores en otros dominios
        }

        # Endpoint DASH
        # Similar a HLS. El reproductor pide GET /dash/<key>.mpd y luego
        # los segmentos referenciados en el manifest.
        location /dash {
            types {
                application/dash+xml mpd;  # Content-Type para manifests DASH
            }
            root /tmp/dash;
            add_header 'Access-Control-Allow-Origin' '*';
        }

        # Endpoint /nginx_status (stub_status)
        # Expone un resumen de conexiones HTTP activas, requests totales, etc.
        # Leído por nginx-prometheus-exporter cada 15 s para generar métricas.
        # Restringido por IP para evitar que sea accesible públicamente.
        location /nginx_status {
            stub_status on;
            access_log off;              # No contaminar los logs con los scrapes de Prometheus
            allow 127.0.0.1;             # Desde el propio contenedor
            allow 172.17.0.1;            # IP del host Docker en la interfaz docker0
            deny all;                    # Bloquear el resto por defecto

            allow 172.0.0.0/8;          # Red interna Docker (bridge networks)
            allow 192.168.0.0/16;        # Subred de monitoreo local
        }

        # Endpoint /stat (rtmp_stat)
        # Genera un XML con el estado del servidor RTMP: streams activos,
        # clientes conectados, bitrate, bytes transferidos, uptime.
        # El rtmp-exporter parsea este XML y expone los datos a Prometheus.
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;  # Hoja de estilo visual para abrir en navegador
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            allow 192.168.0.0/16;
            deny all;
        }
    }

    # Servidor HTTPS:443 (DESACTIVADO)
    # Para activarlo:
    #   1. Crear el Secret TLS `nginx-tls` (ver k8s/02-tls-secret.yaml).
    #   2. Descomentar volumeMounts/volumes en k8s/nginx-stream.yaml para
    #      montar el Secret en /usr/local/nginx/certs.
    #   3. Montar este nginx.conf desde un ConfigMap (mismo bloque en
    #      k8s/nginx-stream.yaml) o reconstruir la imagen.
    #   4. Descomentar el bloque siguiente.
    #
    # server {
    #     listen 443 ssl;
    #     server_name localhost;
    #
    #     ssl_certificate     /usr/local/nginx/certs/tls.crt;
    #     ssl_certificate_key /usr/local/nginx/certs/tls.key;
    #
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # Mismas locations que el server :80 (frontend, HLS, DASH).
    #     location / {
    #         root /usr/share/nginx/html;
    #         index index.html index.htm;
    #     }
    #     location /live {
    #         types {
    #             application/vnd.apple.mpegurl m3u8;
    #             video/mp2t ts;
    #         }
    #         root /tmp/hls;
    #         add_header 'Access-Control-Allow-Origin' '*';
    #     }
    #     location /dash {
    #         types {
    #             application/dash+xml mpd;
    #         }
    #         root /tmp/dash;
    #         add_header 'Access-Control-Allow-Origin' '*';
    #     }
    # }
}
