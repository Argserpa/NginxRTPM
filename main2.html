<!DOCTYPE html>
<!-- ARCHIVO DE PROTOTIPO / PRUEBA
     Página alternativa de player HLS, usada durante el desarrollo inicial para
     probar la reproducción LL-HLS (Low-Latency HLS) antes de crear el frontend
     definitivo en nginx/html/index.html.
     No está servida por nginx (no vive en nginx/html/); es un archivo de
     referencia local que apunta a https://localhost para pruebas manuales. -->
<html>
<head>
    <title>Nginx LL-HLS Stream</title>
    <!-- Video.js: biblioteca de reproducción HLS en el navegador -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f0f0f0; }
        .video-js { margin-top: 20px; }
        h1 { color: #333; }
        p { color: #666; }
    </style>
</head>
<body>
<h1>Mi Stream LL-HLS con Nginx</h1>
<p>Ahora deberías ver un retraso significativamente menor.</p>

<!-- Player apuntando a HTTPS (requiere que nginx esté corriendo con SSL) -->
<video
        id="my-video"
        class="video-js vjs-default-skin"
        controls
        preload="auto"
        width="800"
        height="450"
        data-setup='{}'
>
    <source src="https://localhost/live/mi_stream.m3u8" type="application/x-mpegURL">
    <p class="vjs-no-js">
        Para ver este video, por favor habilita JavaScript y considera actualizar a un navegador web
        que <a href="https://videojs.com/html5-video-support/" target="_blank">soporte video HTML5</a>
    </p>
</video>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<!-- VHS maneja la descarga y segmentación HLS -->
<script src="https://unpkg.com/@videojs/http-streaming@3.9.0/dist/videojs-http-streaming.min.js"></script>
<script>
    var player = videojs('my-video');

    // Configuración de baja latencia: estas opciones reducen el buffer de
    // reproducción a ~1 segmento (~3 s) para minimizar el delay respecto al
    // stream en vivo. Son experimentales en esta versión de Video.js.
    player.hls.liveSyncDuration = 1;      // Intentar mantener el búfer en 1 segundo
    player.hls.liveSyncDurationCount = 1; // Mantener solo 1 segmento en el búfer
    player.hls.enableLowLatency = true;   // Activar funciones LL-HLS explícitamente

    player.on('error', function() {
        console.error('Video.js error:', player.error());
    });
</script>
</body>
</html>
