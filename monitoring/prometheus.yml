# Configuración global
# scrape_interval: frecuencia con la que Prometheus consulta a cada exporter.
# 15 s es un buen equilibrio entre resolución de datos y carga de red.
global:
  scrape_interval: 15s

# Scrape jobs
# Cada job define un conjunto de endpoints del que Prometheus recogerá métricas.
# Los nombres de host ('nginx-exporter', 'rtmp-exporter', etc.) corresponden a
# los nombres de servicio Docker Compose o K8s, resueltos por DNS interno.
scrape_configs:

  # Métricas HTTP de nginx: conexiones activas, requests/s, estado de workers.
  # El nginx-prometheus-exporter lee /nginx_status y lo convierte al formato
  # Prometheus, exponiéndolo en :9113/metrics.
  - job_name: 'nginx'
    metrics_path: /metrics
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          instance: nginx_stream_server

  # Métricas RTMP: clientes conectados por stream, bitrate de entrada/salida,
  # bytes totales transferidos y uptime del servidor nginx-rtmp.
  # El rtmp-exporter (Python/Flask) parsea el XML de /stat y lo expone en
  # :9114/metrics.
  - job_name: 'rtmp'
    metrics_path: /metrics
    static_configs:
      - targets: [ 'rtmp-exporter:9114' ]
        labels:
          instance: nginx_stream_server

  # Auto-monitoreo de Prometheus: uso de memoria, goroutines activas,
  # reglas evaluadas, etc. Útil para detectar problemas en el propio servidor.
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Métricas del sistema operativo del host: CPU, RAM, disco, red, etc.
  # prom/node-exporter monta el filesystem raíz del host en modo read-only
  # (/host) para leer las estadísticas del kernel sin privilegios excesivos.
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100']
